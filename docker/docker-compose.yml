services:
  # Laravel API Backend
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        UID: 1000
        GID: 1000
    container_name: localmind_api
    volumes:
      - ../backend:/var/www:z
    working_dir: /var/www
    depends_on:
      - db
    networks:
      - localmind

  # Nginx reverse proxy for API
  web:
    image: nginx:alpine
    container_name: localmind_nginx
    ports:
      - "8000:80"
    volumes:
      - ../backend:/var/www:z
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:z
    depends_on:
      - app
    networks:
      - localmind

  # PostgreSQL Database
  db:
    image: postgres:17
    container_name: localmind_db
    environment:
      POSTGRES_DB: localmind
      POSTGRES_USER: localmind
      POSTGRES_PASSWORD: localmind
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - localmind

  # Vue.js Frontend
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: localmind_frontend
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app:z
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - web
    networks:
      - localmind

  # pgAdmin (optional, for database management)
  pgadmin:
    image: dpage/pgadmin4
    container_name: localmind_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: localmind@gmail.com
      PGADMIN_DEFAULT_PASSWORD: localmind
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - localmind

networks:
  localmind:

volumes:
  pgdata:
